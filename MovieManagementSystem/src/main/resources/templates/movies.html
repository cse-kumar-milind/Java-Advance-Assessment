<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CineVault — Movie Catalog</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080a0f; --surface: #0e1118; --surface2: #151820;
            --border: rgba(255,255,255,0.06); --accent: #e8b84b;
            --text: #e8eaf0; --muted: #6b7280;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
        header { position: sticky; top: 0; z-index: 10; padding: 0 48px; height: 72px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: rgba(8,10,15,0.85); backdrop-filter: blur(20px); }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: var(--accent); }
        .logo span { color: var(--text); opacity: 0.4; font-size: 14px; margin-left: 8px; font-family: 'DM Sans', sans-serif; vertical-align: middle; }
        .add-btn { background: linear-gradient(135deg, var(--accent), #d4a03a); color: #0a0a0a; text-decoration: none; padding: 10px 24px; font-weight: 500; font-size: 14px; border-radius: 4px; transition: all 0.3s; box-shadow: 0 4px 20px rgba(232,184,75,0.25); }
        .add-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(232,184,75,0.4); }
        main { max-width: 1300px; margin: 0 auto; padding: 48px; }
        .page-title { font-family: 'Bebas Neue', sans-serif; font-size: 52px; letter-spacing: 4px; background: linear-gradient(135deg, #fff, rgba(255,255,255,0.5)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px; }
        .page-subtitle { color: var(--muted); font-size: 14px; font-weight: 300; margin-bottom: 36px; }
        .stat { display: inline-block; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px 24px; margin-bottom: 36px; }
        .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--accent); display: block; }
        .stat-label { font-size: 11px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }
        .table-container { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
        table { width: 100%; border-collapse: collapse; }
        thead { background: var(--surface2); border-bottom: 1px solid var(--border); }
        thead th { padding: 16px 24px; text-align: left; font-size: 10px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
        tbody tr { border-bottom: 1px solid var(--border); transition: background 0.2s; }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: rgba(255,255,255,0.02); }
        td { padding: 18px 24px; font-size: 14px; font-weight: 300; }
        .movie-title { font-weight: 500; font-size: 15px; }
        .genre-badge { display: inline-block; padding: 3px 10px; background: rgba(232,184,75,0.08); border: 1px solid rgba(232,184,75,0.15); border-radius: 20px; font-size: 11px; color: var(--accent); }
        .rating { display: flex; align-items: center; gap: 6px; }
        .rating-dot { width: 8px; height: 8px; border-radius: 50%; }
        .rating-dot.low { background: #e74c3c; }
        .rating-dot.mid { background: #f39c12; }
        .rating-dot.high { background: #27ae60; }
        .actions { display: flex; gap: 8px; }
        .btn-edit { padding: 7px 14px; background: rgba(232,184,75,0.08); border: 1px solid rgba(232,184,75,0.2); color: var(--accent); text-decoration: none; border-radius: 4px; font-size: 12px; font-weight: 500; transition: all 0.2s; }
        .btn-edit:hover { background: rgba(232,184,75,0.15); transform: translateY(-1px); }
        .btn-delete { padding: 7px 14px; background: rgba(192,57,43,0.1); border: 1px solid rgba(192,57,43,0.2); color: #e74c3c; text-decoration: none; border-radius: 4px; font-size: 12px; font-weight: 500; transition: all 0.2s; }
        .btn-delete:hover { background: rgba(192,57,43,0.2); transform: translateY(-1px); }
        .empty-state { text-align: center; padding: 80px 24px; }
        .empty-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: var(--muted); margin: 16px 0 8px; }
        .empty-sub { font-size: 13px; color: var(--muted); opacity: 0.6; }
    </style>
</head>
<body>
<header>
    <div class="logo">CineVault <span>CATALOG</span></div>
    <a href="/movies/addMovie" class="add-btn">+ Add Movie</a>
</header>
<main>
    <h1 class="page-title">Movie Collection</h1>
    <p class="page-subtitle">Manage your complete movie catalog</p>
    <div class="stat">
        <span class="stat-value" th:text="${movies.size()}">0</span>
        <span class="stat-label">Total Movies</span>
    </div>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>#</th><th>Title</th><th>Genre</th>
                    <th>Director</th><th>Year</th><th>Rating</th><th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${movies.isEmpty()}">
                    <td colspan="7">
                        <div class="empty-state">
                            <div style="font-size:48px;opacity:0.3">🎬</div>
                            <div class="empty-title">No Movies Yet</div>
                            <p class="empty-sub">Start by adding your first movie</p>
                        </div>
                    </td>
                </tr>
                <tr th:each="movie, stat : ${movies}">
                    <td th:text="${stat.count}">1</td>
                    <td><span class="movie-title" th:text="${movie.title}">Title</span></td>
                    <td><span class="genre-badge" th:text="${movie.genre}">Genre</span></td>
                    <td th:text="${movie.director}">Director</td>
                    <td th:text="${movie.year}">2024</td>
                    <td>
                        <div class="rating">
                            <span class="rating-dot"
                                th:classappend="${movie.rating >= 7} ? 'high' : (${movie.rating >= 5} ? 'mid' : 'low')">
                            </span>
                            <span th:text="${movie.rating}">8.5</span>
                        </div>
                    </td>
                    <td>
                        <div class="actions">
                            <a th:href="@{/movies/edit/{id}(id=${movie.id})}" class="btn-edit">✎ Edit</a>
                            <a th:href="@{/movies/{id}(id=${movie.id})}" class="btn-delete"
                               onclick="return confirm('Delete this movie?')">✕ Delete</a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
